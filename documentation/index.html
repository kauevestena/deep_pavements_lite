# Getting Started

Welcome to **Deep Pavements Lite**, an automated pipeline for pavement surface material classification from street-level imagery using CLIP and OneFormer.

---

## 📋 Requirements

- **Operating System:** Linux / macOS
- **Python:** version `3.10` or higher
- **Core Dependencies:** PyTorch, Torchvision, Transformers, GeoPandas, Shapely, OpenCV
- **Mapillary Access:** A Mapillary developer token (v4 API) is required to query metadata and download images.

---

## 🚀 Installation & Setup

Follow these steps to set up the environment and run your first analysis:

### 1. Initialize Submodules
Deep Pavements Lite uses the `my_mappilary_api` submodule for map data downloading. If you haven't done so, initialize it:
```bash
git submodule update --init --recursive
```

### 2. Configure Your API Token
Create a file named `mapillary_token` in the root of the project folder containing your Mapillary access token:
```bash
echo "YOUR_MAPILLARY_TOKEN" > mapillary_token
```
*Alternatively, you can export it to your environment:*
```bash
export MAPILLARY_API="YOUR_MAPILLARY_TOKEN"
```

### 3. Run the Automated Setup
Use the provided `setup.sh` script to configure the directories, download the fine-tuned CLIP model weights, and run the verification smoke test:
```bash
./setup.sh
```

---

## 🏃 Running the Curitiba Sample

To run the pipeline over the sample area in **Curitiba, Brazil** using the command line runner:

```bash
.venv/bin/python runner.py \
    --lat_min -25.452901 \
    --lon_min -49.270045 \
    --lat_max -25.448231 \
    --lon_max -49.256247 \
    --map \
    --debug
```

### Command Options:
- `--map`: Generates a global interactive Leaflet map of results inside `data/output/`.
- `--debug`: Saves intermediary step images (heuristic masks, crops) and generates a detailed step-by-step debug HTML report.
- `--half_res` / `--quarter_res`: Downscale images to save memory and CPU/GPU processing time.

---

## 📁 Output Structure

All outputs are saved to the `data/` directory by default:

```
data/
├── output/
│   ├── surface_classifications.geojson  # GeoJSON spatial feature dataset
│   ├── surface_classifications.gpkg     # GeoPackage database
│   ├── model_info.json                  # Metadata about model versions
│   └── global_map.html                  # Interactive Leaflet map (with --map)
└── debug_outputs/
    ├── reports/
    │   └── debug_report.html            # Standalone visual HTML report (with --debug)
    └── [image_id]_roads_0.png           # Intermediary cropped segments for CLIP
```

    <script type="text/markdown" id="doc-architecture">
# Architecture Overview

Deep Pavements Lite uses a multi-modal computer vision pipeline to extract and classify sidewalk and road surface materials from street-level photographs.

---

## ⚙️ The Execution Pipeline

The processing pipeline runs in several distinct phases:

```mermaid
graph TD
    A[Mapillary API Query] -->|Images Metadata| B[Image Downloader]
    B -->|Local JPGs| C[OneFormer Segmentation]
    C -->|Class Masks| D[Geometry Engine]
    D -->|Segment Polygons| E[CLIP Classifier]
    E -->|Surface Preds| F[Side Classification]
    F -->|Consolidated GDF| G[Exporter]
    G -->|GeoJSON/GPKG| H[Spatial Dataset]
    G -->|Leaflet Map| I[Global Map HTML]
    G -->|Intermediary Images| J[Debug HTML Report]
```

### 1. Image Download & Bounding Box Query
The pipeline queries the Mapillary Graph API v4 for all image coordinates, sequences, and metadata falling inside the requested bounding box. Images are downloaded asynchronously to disk (supporting downscaling for speed and memory conservation).

### 2. Semantic Segmentation (OneFormer)
Each image is processed with **OneFormer** (trained on Cityscapes) to generate a semantic mask segmenting:
- **Roads** (Class ID `0`)
- **Sidewalks** (Class ID `1`)
- **Cars** (Class ID `13`)

### 3. Geometry & Polygon Extraction
The pipeline extracts shapes from the segmentation mask:
- Contours are converted to Shapely polygons.
- The **Road Axis Line** is computed to divide the view.
- Sidewalk segments are sorted into **left** and **right** regions relative to the camera heading and road axis.

### 4. CLIP Classification
For each detected road or sidewalk polygon:
1. The bounding box of the polygon is cropped from the original street image.
2. The crop is passed to the **fine-tuned CLIP model** (`ViT-B/32`).
3. The model classifies the surface into one of 11 canonical materials (e.g., asphalt, concrete, paving stones, ground).

### 5. Consolidation & Export
Results are aggregated into a single GeoDataFrame where each image represents a point feature containing:
- `road`: surface type and confidence.
- `left_sidewalk`: surface type (or `no_sidewalk` / `car_hindered`).
- `right_sidewalk`: surface type (or `no_sidewalk` / `car_hindered`).

---

## 🛠️ Code Module Layout

The codebase has been refactored for clarity and modularity under `modules/`:

- **`pipeline.py`:** Core entry point coordinating the end-to-end processing.
- **`segmentation.py`:** Handles image segmentation with OneFormer or fallback heuristics.
- **`classification.py`:** Prepares crops and coordinates CLIP surface classification.
- **`models.py`:** Model weights download and instance factories.
- **`geometry.py`:** Spatial operations, road axis computation, left/right sorting.
- **`visualization.py`:** Renders interactive Leaflet maps.
- **`debug.py`:** Generates localized intermediary debug images and HTML reports.
- **`constants.py`:** Configuration parameters, file extensions, and class mappings.

# API Reference

This page describes the primary public APIs and modules in the Deep Pavements Lite package.

---

## 📌 Pipeline Module (`modules.pipeline`)

The main interface for running the end-to-end processing pipeline.

### `process_images(images_gdf, output_path, debug_mode=False, workers=1)`
Processes all street images defined in the metadata GeoDataFrame.

- **Parameters:**
  - `images_gdf` *(geopandas.GeoDataFrame)*: Input table containing image IDs, file paths, and geospatial geometry (points).
  - `output_path` *(str)*: Target directory to save result GeoJSON, GeoPackage, and JSON metadata.
  - `debug_mode` *(bool, optional)*: If `True`, enables step-by-step intermediate image export and builds an HTML visual debug report. Default is `False`.
  - `workers` *(int, optional)*: Number of parallel workers for I/O operations. Default is `1`.
- **Returns:**
  - `geopandas.GeoDataFrame`: The processed GDF enriched with `road`, `left_sidewalk`, and `right_sidewalk` classification columns.

---

## 📌 Classification Module (`modules.classification`)

Interfaces with CLIP to identify material surface classes.

### `classify_surface_type(image, polygon, model, preprocess, device="cpu")`
Classifies the surface material of a specific segmented polygon.

- **Parameters:**
  - `image` *(PIL.Image)*: Original high-resolution street photo.
  - `polygon` *(np.ndarray)*: Flattened list of polygon boundary coordinates `[x1, y1, x2, y2, ...]`.
  - `model` *(CLIP)*: CLIP model instance.
  - `preprocess` *(callable)*: Image transform function.
  - `device` *(str, optional)*: Execution device (`"cuda"` or `"cpu"`).
- **Returns:**
  - `dict`: A dictionary containing predicted `surface` string and `confidence` float.

---

## 📌 Geometry Module (`modules.geometry`)

Performs spatial checks and shapes classification.

### `get_road_axis_line(road_polygons, image_size)`
Calculates the central dividing line of the road using PCA or centroid orientations.

- **Parameters:**
  - `road_polygons` *(list[np.ndarray])*: Polygons representing the road surface.
  - `image_size` *(tuple[int, int])*: Width and height of the image.
- **Returns:**
  - `shapely.geometry.LineString | None`: Dividing line representing the road axis.

### `classify_sidewalk_regions(segmentation_result, road_axis, image_size)`
Divides detected sidewalks into left and right sides relative to the road axis.

- **Parameters:**
  - `segmentation_result` *(dict)*: Dictionary of detected polygons and their surface types.
  - `road_axis` *(LineString)*: Calculated dividing axis line.
  - `image_size` *(tuple[int, int])*: Width and height of the image.
- **Returns:**
  - `dict`: Dictionary mapping `"left_sidewalk"` and `"right_sidewalk"` to their surface types.

---

## 📌 Visualization Module (`modules.visualization`)

Renders GIS overlays and interactive maps.

### `generate_map(gdf, output_path)`
Creates a standalone, interactive Leaflet HTML map showing points color-coded by pavement surface materials.

- **Parameters:**
  - `gdf` *(geopandas.GeoDataFrame)*: The final processed GDF containing pavement classification results.
  - `output_path` *(str)*: Target folder where `global_map.html` and assets will be saved.

# Configuration & Settings

Deep Pavements Lite can be customized by modifying environment variables, parameters files, or the package constants.

---

## ⚙️ Configuration Files

### `params.json`
Located at the root of the repository, this file stores basic runtime parameters:
```json
{
  "max_images": null,
  "debug": false,
  "half_res": false,
  "quarter_res": false,
  "workers": 1
}
```

---

## 📌 Constant Definitions (`modules.constants`)

Core settings are centralized in `modules/constants.py`:

- **`DEVICE`**: Automatically set to `"cuda"` if a GPU is available; otherwise defaults to `"cpu"`.
- **`CLIP_ARCHITECTURE`**: Set to `"ViT-B/32"`.
- **`pathway_categories`**: Defines target segmentation classes: `["roads", "sidewalks", "car"]`.
- **`PATHWAY_CLASS_MAPPING`**: Maps target classes to Cityscapes IDs:
  - `roads`: Class ID `0`
  - `sidewalks`: Class ID `1`
  - `car`: Class ID `13`
- **`default_surfaces`**: The 11 surface types classified by CLIP:
  - `asphalt`, `concrete`, `concrete_plates`, `grass`, `ground`, `sett`, `paving_stones`, `cobblestone`, `gravel`, `sand`, `compacted`.

---

## 🌐 Environment Variables

Use environment variables to customize runtime behavior:

| Variable | Description | Default |
| :--- | :--- | :--- |
| `MAPILLARY_API` | Your Mapillary developer access token. | None |
| `TO_PRECACHE` | If `true`, downloads models at build-time (used in Dockerfile). | `true` |

---

## 🤖 Model Customization

By default, the pipeline automatically fetches the fine-tuned CLIP model from Hugging Face:
- **Repository:** `kauevestena/clip-vit-base-patch32-finetuned-surface-materials`
- **Filename:** `pytorch_model.bin`
- **Direct Download URL:** `https://huggingface.co/kauevestena/clip-vit-base-patch32-finetuned-surface-materials/resolve/main/model.pt`

To use a custom model, place your model weight file at the root named `deep_pavements_clip_model.pt`.

    <script>
        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {
                background: '#0a0e17',
                primaryColor: '#8b5cf6',
                primaryTextColor: '#f3f4f6',
                lineColor: '#374151',
                textColor: '#9ca3af'
            }
        });

        // Configure Marked.js
        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        // Navigation logic
        const navItems = document.querySelectorAll('.nav-item');
        const contentBody = document.getElementById('content-body');

        async function loadDocument(docId) {
            contentBody.classList.remove('loaded');
            
            // Highlight sidebar item
            navItems.forEach(item => {
                if (item.getAttribute('data-doc') === docId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 1. Try to fetch the external markdown file first (works when running http-server)
            let markdownText = "";
            try {
                const response = await fetch(`${docId}.md`);
                if (response.ok) {
                    markdownText = await response.text();
                } else {
                    throw new Error(`Status ${response.status}`);
                }
            } catch (err) {
                // 2. Fallback to inline scripts if CORS blocks local fetching (file:// protocol)
                console.warn(`Local fetch failed (${err.message}), falling back to embedded markdown.`);
                const scriptEl = document.getElementById(`doc-${docId}`);
                if (scriptEl) {
                    markdownText = scriptEl.textContent;
                } else {
                    markdownText = `# ⚠️ Error\nCould not load document "${docId}".`;
                }
            }

            // Render Markdown
            contentBody.innerHTML = marked.parse(markdownText);
            
            // Post-process code snippets and Mermaid diagrams
            // Render Mermaid blocks
            const mermaidBlocks = contentBody.querySelectorAll('.language-mermaid');
            for (let i = 0; i < mermaidBlocks.length; i++) {
                const block = mermaidBlocks[i];
                const parent = block.parentElement; // <pre>
                const code = block.textContent;
                const insertDiv = document.createElement('div');
                insertDiv.className = 'mermaid-render';
                insertDiv.id = `mermaid-svg-${i}`;
                parent.parentNode.replaceChild(insertDiv, parent);
                try {
                    const renderId = `mermaid-render-svg-${i}`;
                    const { svg } = await mermaid.render(renderId, code);
                    insertDiv.innerHTML = svg;
                } catch (err) {
                    insertDiv.innerHTML = `<span style="color: #ef4444; font-family: monospace;">Mermaid Render Error: ${err.message}</span>`;
                }
            }

            // Trigger code syntax highlighting
            contentBody.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            // Animation transition
            setTimeout(() => {
                contentBody.classList.add('loaded');
            }, 50);
        }

        // Router based on hash change
        function handleRoute() {
            const hash = window.location.hash.replace('#', '') || 'getting_started';
            loadDocument(hash);
        }

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('DOMContentLoaded', handleRoute);
    </script>
</body>
</html>
